# repo-expert configuration
# Copy to config.yaml. Only three fields are required: the chat model and,
# per repo, a path + description. Everything else has sensible defaults.

provider:
  model: qwen3-coder:30b                  # Chat model id, as the endpoint knows it
  # base_url: http://localhost:11434/v1   # OpenAI-compatible endpoint. Default: local Ollama.
  # embedding_engine: transformersjs      # In-process embeddings via transformers.js — no Ollama embedding model needed
  # embedding_model: nomic-embed-text     # http: model id on the same endpoint (`ollama pull nomic-embed-text`). transformersjs: HF model id, default nomic-ai/nomic-embed-text-v1.5
  # fast_model: llama3.2:3b               # Smaller/faster model used by `ask --fast`
  # fallback_models: []                   # Tried in order when `model` fails (rate limit, timeout, ...)

# consolidate_on_sync: true               # Refresh the agent's memory blocks after syncs that touch 5+ files

# memory:
#   git_versioned: true                   # Store persona/architecture/conventions as markdown (git-friendly)
#   dir: .repo-expert/memory              # Per-agent *.md files under this directory

repos:
  my-app:
    path: ~/repos/my-app
    description: "React Native mobile app"
    # extensions: [.ts, .tsx]             # Default: common code/doc extensions (.ts .js .py .go .rs .md ...)
    # ignore_dirs: [node_modules, .git]   # Default: node_modules, .git, dist, build, vendor, ...
    # persona: "You are the expert on my-app."
    # base_path: packages/frontend        # Monorepo: index only this subtree
    # include_submodules: true            # Also index files inside git submodules

# Remote endpoint instead of local Ollama (e.g. OpenRouter): set base_url and
# put LLM_API_KEY in .env — it's sent as an `Authorization: Bearer` header.
#
# provider:
#   model: openai/gpt-4o-mini
#   base_url: https://openrouter.ai/api/v1
